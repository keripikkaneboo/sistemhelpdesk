# /etc/nginx/sites-available/helpdesk-api
# Salin file ini ke VPS:
#   scp deployment/nginx-helpdesk-api.conf root@<IP_VPS>:/etc/nginx/sites-available/helpdesk-api
# Aktifkan:
#   ln -s /etc/nginx/sites-available/helpdesk-api /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name api.DOMAIN-ANDA.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.DOMAIN-ANDA.com;

    # SSL — diisi otomatis oleh certbot
    ssl_certificate /etc/letsencrypt/live/api.DOMAIN-ANDA.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.DOMAIN-ANDA.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # FastAPI backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Ollama proxy — untuk admin-page embedding
    # Hanya izinkan POST ke /api/embeddings
    location /ollama/ {
        rewrite ^/ollama/(.*) /$1 break;
        proxy_pass http://127.0.0.1:11434;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;

        # Batasi hanya ke endpoint embedding
        limit_except POST OPTIONS {
            deny all;
        }
    }
}
