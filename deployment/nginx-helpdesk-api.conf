# /etc/nginx/sites-available/helpdesk-api
# Ganti semua "api.DOMAIN-ANDA.com" dengan domain Anda sebelum digunakan.
#
# Cara install di VPS:
#   1. Ganti domain: sed -i 's/api.DOMAIN-ANDA.com/api.namadomain.com/g' /etc/nginx/sites-available/helpdesk-api
#   2. Aktifkan: ln -s /etc/nginx/sites-available/helpdesk-api /etc/nginx/sites-enabled/
#   3. Test: nginx -t && systemctl reload nginx
#   4. SSL: certbot --nginx -d api.namadomain.com

server {
    listen 80;
    server_name api.DOMAIN-ANDA.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.DOMAIN-ANDA.com;

    # SSL — diisi otomatis oleh certbot
    ssl_certificate /etc/letsencrypt/live/api.DOMAIN-ANDA.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.DOMAIN-ANDA.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # FastAPI backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Ollama proxy — untuk admin-page embedding (POST /api/embeddings saja)
    location /ollama/ {
        rewrite ^/ollama/(.*) /$1 break;
        proxy_pass http://127.0.0.1:11434;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
        limit_except POST OPTIONS {
            deny all;
        }
    }
}
